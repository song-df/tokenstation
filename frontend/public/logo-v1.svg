<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
<defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b3450"/>
      <stop offset="100%" stop-color="#0e1f33"/>
    </linearGradient>
    <linearGradient id="metalHead" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef1f5"/>
      <stop offset="25%" stop-color="#cdd4dc"/>
      <stop offset="50%" stop-color="#a3adb8"/>
      <stop offset="75%" stop-color="#c4ccd4"/>
      <stop offset="100%" stop-color="#dce1e7"/>
    </linearGradient>
    <linearGradient id="metalTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#cdd4dc"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d3339"/>
      <stop offset="30%" stop-color="#4a5259"/>
      <stop offset="55%" stop-color="#5a6269"/>
      <stop offset="75%" stop-color="#454b52"/>
      <stop offset="100%" stop-color="#242930"/>
    </linearGradient>
    <linearGradient id="crossbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a7279"/>
      <stop offset="50%" stop-color="#3a4048"/>
      <stop offset="100%" stop-color="#6a7279"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <!-- Subtle grid (blueprint reference) -->
    <g stroke="#4a6fa5" stroke-width="0.5" opacity="0.06">
      <line x1="0" y1="128" x2="1024" y2="128"/>
<line x1="0" y1="256" x2="1024" y2="256"/>
<line x1="0" y1="384" x2="1024" y2="384"/>
<line x1="0" y1="512" x2="1024" y2="512"/>
<line x1="0" y1="640" x2="1024" y2="640"/>
<line x1="0" y1="768" x2="1024" y2="768"/>
<line x1="0" y1="896" x2="1024" y2="896"/>
      <line x1="128" y1="0" x2="128" y2="1024"/>
<line x1="256" y1="0" x2="256" y2="1024"/>
<line x1="384" y1="0" x2="384" y2="1024"/>
<line x1="512" y1="0" x2="512" y2="1024"/>
<line x1="640" y1="0" x2="640" y2="1024"/>
<line x1="768" y1="0" x2="768" y2="1024"/>
<line x1="896" y1="0" x2="896" y2="1024"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <!-- Hammer head (A shape) -->
    <path d="
    M 172 250
    L 852 250
    L 612 470
    L 412 470
    Z
  " fill="url(#metalHead)" stroke="#7a838d" stroke-width="1.5"/>
    <!-- Top bevel -->
    <path d="
    M 172 250
    L 852 250
    L 840 266
    L 184 266
    Z
  " fill="url(#metalTop)"/>
    <!-- Claw detail -->
    <path d="
    M 832 266
    L 860 290
    L 844 286
    Z
  " fill="#7a838d" opacity="0.4"/>
    <!-- Crossbar groove (A crossbar) -->
    <path d="
    M 322 354
    L 702 354
    L 702 366
    L 322 366
    Z
  " fill="url(#crossbar)" opacity="0.7"/>
    <!-- Handle (I) -->
    <path d="
    M 482 470
    L 542 470
    L 542 730
    L 482 730
    Z
  " fill="url(#handle)" stroke="#1a1f24" stroke-width="1"/>
    <!-- Handle cap -->
    <path d="
    M 474 730
    L 550 730
    L 542 746
    L 482 746
    Z
  " fill="url(#handle)"/>
  </g>
</svg>