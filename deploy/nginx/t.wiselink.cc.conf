	map $http_x_api_key $auth_header_wl {
	    ""       $http_authorization;
	    default  "Bearer $http_x_api_key";
	}

	server {
	    server_name t.wiselink.cc;
	    root /www/wwwroot/wiselink.cc;
	    index index.html;

	    location /api/v1/ {
	        client_max_body_size 100m;
	        proxy_pass http://127.0.0.1:8002/v1/;
	        proxy_set_header Host $host;
	        proxy_set_header X-Real-IP $remote_addr;
	        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	        proxy_set_header X-Forwarded-Proto $scheme;
	        proxy_set_header Authorization $auth_header_wl;
	        proxy_http_version 1.1;
	        proxy_buffering off;
	        proxy_read_timeout 600s;
	        proxy_send_timeout 600s;
	    }
	    location /api/external/ {
	        client_max_body_size 1m;
	        proxy_pass http://127.0.0.1:8003/;
	        proxy_set_header Host $host;
	        proxy_set_header X-Real-IP $remote_addr;
	        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	        proxy_set_header X-Forwarded-Proto $scheme;
	        proxy_read_timeout 30s;
	        proxy_send_timeout 30s;
	    }

	    location /api/student/site-config {
	        proxy_pass http://127.0.0.1:8001;
	        proxy_set_header Host $host;
	        proxy_set_header X-Real-IP $remote_addr;
	        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	        proxy_set_header X-Forwarded-Proto $scheme;
	        proxy_pass_request_headers on;
	    }

	    location /api/wechat/ {
	        client_max_body_size 10m;
	        proxy_pass http://127.0.0.1:8001;
	        proxy_set_header Host $host;
	        proxy_set_header X-Real-IP $remote_addr;
	        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	        proxy_set_header X-Forwarded-Proto $scheme;
	        proxy_pass_request_headers on;
	    }

	    location /api/alipay/ {
	        client_max_body_size 10m;
	        proxy_pass http://127.0.0.1:8001;
	        proxy_set_header Host $host;
	        proxy_set_header X-Real-IP $remote_addr;
	        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	        proxy_set_header X-Forwarded-Proto $scheme;
	        proxy_pass_request_headers on;
	    }

	    location /api/redeem/ {
        client_max_body_size 10m;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    location /api/proxy/ {
	        client_max_body_size 10m;
	        proxy_pass http://127.0.0.1:8001;
	        proxy_set_header Host $host;
	        proxy_set_header X-Real-IP $remote_addr;
	        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	        proxy_set_header X-Forwarded-Proto $scheme;
	        proxy_pass_request_headers on;
	    }
	    location /api/ {
	        client_max_body_size 100m;
	        proxy_pass http://127.0.0.1:8002;
	        proxy_set_header Host $host;
	        proxy_set_header X-Real-IP $remote_addr;
	        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	        proxy_set_header X-Forwarded-Proto $scheme;
	        proxy_set_header Authorization $auth_header_wl;
	        proxy_http_version 1.1;
	        proxy_buffering off;
	        proxy_read_timeout 600s;
	        proxy_send_timeout 600s;
	    }
	    location /v1/ {
	        client_max_body_size 100m;
	        proxy_pass http://127.0.0.1:8002;
	        proxy_set_header Host $host;
	        proxy_set_header X-Real-IP $remote_addr;
	        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	        proxy_set_header X-Forwarded-Proto $scheme;
	        proxy_set_header Authorization $auth_header_wl;
	        proxy_http_version 1.1;
	        proxy_buffering off;
	        proxy_read_timeout 600s;
	        proxy_send_timeout 600s;
	    }
	    location / {
	        try_files $uri $uri/ /index.html;
	    }

	    listen 443 ssl;
	    ssl_certificate /etc/letsencrypt/live/t.wiselink.cc/fullchain.pem;
	    ssl_certificate_key /etc/letsencrypt/live/t.wiselink.cc/privkey.pem;
	    include /etc/letsencrypt/options-ssl-nginx.conf;
	    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
	}
	server {
	    if ($host = t.wiselink.cc) { return 301 https://$host$request_uri; }
	    listen 80;
	    server_name t.wiselink.cc;
	    return 404;
	}
