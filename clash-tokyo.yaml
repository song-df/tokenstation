# ClashX Meta / Clash Verge (mihomo) 配置
# 东京自建节点 8.209.242.59 — AI 相关流量走东京，其它默认直连
# 用法：放入 ClashX Meta 配置目录或在 Clash Verge 导入为本地配置

mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false
unified-delay: true
tcp-concurrent: true

# 如需全局透明代理可开启 tun（ClashX Meta 需授权 helper）
tun:
  enable: false
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.aiotedu.cc"        # 自己网关走直连解析
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:               # 国内直连域名用国内 DNS
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
  proxy-server-nameserver:  # 解析节点服务器地址用
    - https://223.5.5.5/dns-query
  # 走代理的域名由节点在东京就地解析（fake-ip 已保证不在本地泄漏）

proxies:
  - name: "🇯🇵东京自建"
    type: ss
    server: 8.209.242.59
    port: 37858
    cipher: 2022-blake3-aes-128-gcm
    password: "RhDmno7UUnj1qmYjMr2oeQ=="
    udp: true
  # 备用：公网被干扰时改用 ZeroTier 内网（需本机已加入 ZeroTier）
  - name: "🇯🇵东京-ZT"
    type: ss
    server: 10.114.108.147
    port: 37858
    cipher: 2022-blake3-aes-128-gcm
    password: "RhDmno7UUnj1qmYjMr2oeQ=="
    udp: true

proxy-groups:
  - name: "AI专线"          # AI 相关流量走这里
    type: select
    proxies:
      - "🇯🇵东京自建"
      - "🇯🇵东京-ZT"
      - DIRECT
  - name: "其它流量"        # 漏网之鱼，默认直连，可手动切到节点
    type: select
    proxies:
      - DIRECT
      - "🇯🇵东京自建"

